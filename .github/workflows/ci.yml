name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src tests
      - name: Type check
        run: |
          source .venv/bin/activate
          mypy src || true  # don't fail on mypy yet, src is empty
      - name: Test
        run: |
          source .venv/bin/activate
          pytest || true  # don't fail on no-tests yet
